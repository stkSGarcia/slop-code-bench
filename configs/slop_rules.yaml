            stopBy: neighbor
            kind: except_clause
            all:
            - any:
              - regex: '^except\s*:'
              - regex: '^except\s+(Exception|BaseException)(\s+as\s+\w+)?\s*:'
            - has:
                stopBy: neighbor
                kind: block
                all:
                - has:
                    stopBy: neighbor
                    kind: return_statement
                    regex: ^return\s+(None|False|True|\[\]|\{\}|""|0|\(\)|set\(\))\s*$
                - not:
                    has:
                      stopBy: neighbor
                      not:
                        any:
                        - kind: return_statement
                        - kind: comment
    - not:
        has:
          stopBy: neighbor
          any:
          - kind: for_statement
          - kind: while_statement
          - kind: match_statement
          - kind: with_statement
---
id: dispatch-by-string-equality
