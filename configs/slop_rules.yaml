id: defensive-error-message-repeated-fields
language: python
severity: info
message: Function raises the same error type 5+ times; rewrite as a small validator at the boundary or a single `raise` with an accumulated message.
metadata:
  weight: 3
  category: slop
rule:
  kind: function_definition
  regex: (raise\s+\w+Error\([\s\S]*?){5,}
---
id: defensive-validator-function
language: python
severity: warning
message: "Function body runs `if not isinstance(...): raise \u2026` plus returns; this is a boundary validator living inside core logic. Validate once at the entrypoint, not per helper."
metadata:
  weight: 4
  category: slop
rule:
  kind: function_definition
  all:
  - has:
      field: body
      kind: block
      has:
        stopBy: end
        kind: if_statement
        any:
        - pattern: "if not isinstance($V, $T):\n    raise $$$A\n"
        - pattern: "if not isinstance($V, ($$$T)):\n    raise $$$A\n"
  - has:
      field: body
      kind: block
      has:
        stopBy: end
        kind: raise_statement
        has:
          stopBy: end
          kind: string
          regex: \{[^}]*\}
---
id: defensive-validator-returnmix
language: python
severity: warning
message: "Function combines `isinstance` guards with `is None` guards and returns; stop per-field validation \u2014 assert the contract at the boundary."
metadata:
  weight: 4
  category: slop
rule:
  kind: function_definition
  all:
  - has:
      field: body
      kind: block
      has:
        stopBy: end
        kind: if_statement
        any:
        - pattern: "if not isinstance($V, $T):\n    return $$$A\n"
        - pattern: "if not isinstance($V, ($$$T)):\n    return $$$A\n"
  - has:
      field: body
      kind: block
      has:
        stopBy: end
        kind: if_statement
        any:
        - pattern: "if $V2 is None:\n    return $$$A\n"
        - pattern: "if not $V2:\n    return $$$A\n"
---
id: defensive-function-isinstance-heavy
language: python
severity: warning
message: Function has 2+ `isinstance` checks in its body; inline type-policing is defensive slop. Validate at the boundary, then trust the type.
metadata:
  weight: 5
  category: slop
rule:
  kind: function_definition
  all:
  - has:
      field: body
      kind: block
      has:
        stopBy: end
        kind: call
        regex: ^isinstance\(
  - has:
      field: body
      kind: block
      has:
        stopBy: end
        kind: if_statement
        pattern: "if not isinstance($V, $T):\n    $$$A\n"
  - has:
      field: body
      kind: block
      has:
        stopBy: end
        kind: if_statement
        any:
        - pattern: "if isinstance($V, $T):\n    $$$A\n"
        - pattern: "if not isinstance($V, $T):\n    $$$A\n"
        precedes:
          stopBy: end
          kind: if_statement
          any:
          - pattern: "if isinstance($V2, $T2):\n    $$$B\n"
          - pattern: "if not isinstance($V2, $T2):\n    $$$B\n"
---
id: defensive-function-nullable-heavy
language: python
severity: warning
message: "Function has 2+ `if \u2026 is None: return/raise` guards threaded through its body; normalize nullability at the boundary, don't plumb `None`."
metadata:
  weight: 5
  category: slop
rule:
  kind: function_definition
  has:
    field: body
    kind: block
    all:
    - has:
        stopBy: end
        kind: if_statement
        any:
        - pattern: "if $V is None:\n    return $$$A\n"
        - pattern: "if $V is None:\n    raise $$$A\n"
    - has:
        stopBy: end
        kind: if_statement
        any:
        - pattern: "if $V2 is None:\n    return $$$A\n"
        - pattern: "if $V2 is None:\n    raise $$$A\n"
        precedes:
          stopBy: end
          kind: if_statement
          any:
          - pattern: "if $V3 is None:\n    return $$$A\n"
          - pattern: "if $V3 is None:\n    raise $$$A\n"
---
id: type-probe-ladder
language: python
severity: warning
message: "Two `if isinstance(same_var, T): \u2026` branches back-to-back are a type-probe ladder; use a dispatch table or polymorphism."
metadata:
  weight: 4
  category: slop
rule:
  kind: if_statement
  all:
  - pattern: "if isinstance($V, $T1):\n    $$$A\n"
  - precedes:
      stopBy: neighbor
      kind: if_statement
      pattern: "if isinstance($V, $T2):\n    $$$B\n"
---
id: multi-none-or-chain
language: python
severity: warning
message: '`if a is None or b is None [or c is None]: return/raise/continue` is defensive multi-arg null policing; normalize nullability at the boundary.'
metadata:
  weight: 4
  category: slop
rule:
  kind: if_statement
  all:
  - regex: is None\s+or\s+\w[\w.]*\s+is None
  - has:
      field: consequence
      kind: block
      has:
        stopBy: neighbor
        any:
        - kind: return_statement
        - kind: raise_statement
        - kind: continue_statement
---
id: isinstance-return-constructor
language: python
severity: warning
message: '`if isinstance(x, T): return T(x)` re-wraps a value already of the target type; drop the guard and the wrap.'
metadata:
  weight: 4
  category: slop
rule:
  kind: if_statement
  any:
  - pattern: "if isinstance($VALUE, $TYPE):\n    return $TYPE($VALUE)\n"
  - pattern: "if isinstance($VALUE, $TYPE):\n    return $TYPE($$$ARGS)\n"
---
id: wrap-raise-fstring
language: python
severity: warning
message: "`except X as e: raise MyError(f'\u2026: {e}') from e` renames exceptions for cosmetics; let the original propagate or catch something specific."
metadata:
  weight: 4
  category: slop
rule:
  kind: except_clause
  all:
  - regex: '^except\s+(Exception|BaseException|OSError|ValueError|TypeError|RuntimeError|KeyError|IndexError|AttributeError|ArithmeticError)(\s+as\s+\w+)?\s*:'
  - has:
      stopBy: neighbor
      kind: block
      all:
      - has:
          stopBy: neighbor
          kind: raise_statement
          has:
            stopBy: end
            kind: string
            regex: \{[^}]*\}
      - not:
          has:
            stopBy: neighbor
            not:
              any:
              - kind: raise_statement
              - kind: comment
---
id: except-return-static-sentinel
language: python
severity: warning
message: '`except Exception: return None/False/[]/{}` is bare-exception-to-sentinel; catch something specific or let it propagate.'
metadata:
  weight: 5
  category: slop
rule:
  kind: except_clause
  all:
  - any:
    - regex: '^except\s*:'
    - regex: '^except\s+(Exception|BaseException)(\s+as\s+\w+)?\s*:'
  - has:
      stopBy: neighbor
      kind: block
      all:
      - has:
          stopBy: neighbor
          kind: return_statement
          regex: ^return\s+(None|False|True|\[\]|\{\}|""|0|\(\)|set\(\))\s*$
      - not:
          has:
            stopBy: neighbor
            not:
              any:
              - kind: return_statement
              - kind: comment
---
id: triple-attr-none-default-chain
language: python
severity: info
message: '`x = data.get(k, d1) or d2` double-guards a `.get` miss; pick one default path.'
metadata:
  weight: 3
  category: slop
rule:
  kind: assignment
  any:
  - pattern: '$X = $DATA.get($KEY, $D1) or $D2

      '
  - pattern: '$X = $DATA.get($KEY) or $DATA.get($KEY2) or $FALLBACK

      '
---
id: redundant-coerce-to-str
language: python
severity: info
message: '`str(x) if x is not None else ''''` coerces a typed value; trust the annotation.'
metadata:
  weight: 3
  category: slop
rule:
  kind: conditional_expression
  any:
  - pattern: str($X) if $X is not None else ""
  - pattern: str($X) if $X is not None else ''
  - pattern: str($X) if isinstance($X, str) else ""
  - pattern: str($X) if isinstance($X, str) else ''
---
id: none-continue-in-loop
language: python
severity: warning
message: '`if x is None: continue` inside a loop is defensive null-skipping; filter at the source or raise on contract violation.'
