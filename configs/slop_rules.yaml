              - kind: return_statement
              - kind: comment
  - precedes:
      stopBy: neighbor
      kind: if_statement
      has:
        field: consequence
        kind: block
        all:
        - has:
            stopBy: neighbor
            kind: return_statement
            regex: ^return\s+None\s*$
        - not:
            has:
              stopBy: neighbor
              not:
                any:
                - kind: return_statement
                - kind: comment
