    - regex: ^if\s+\w+\s*==\s*'[A-Z_][A-Z0-9_]*'
  - precedes:
      stopBy: neighbor
      kind: if_statement
      any:
      - regex: ^if\s+\w+\s*==\s*"[A-Z_][A-Z0-9_]*"
      - regex: ^if\s+\w+\s*==\s*'[A-Z_][A-Z0-9_]*'
