  weight: 5
  category: slop
rule:
  kind: function_definition
  has:
    field: body
    kind: block
    all:
    - has:
        stopBy: neighbor
        kind: if_statement
        any:
        - pattern: "if not isinstance($V1, $T1):\n    raise $$$A1\n"
        - pattern: "if not isinstance($V1, ($$$T1)):\n    raise $$$A1\n"
    - has:
        stopBy: neighbor
        kind: if_statement
        any:
        - pattern: "if not isinstance($V2, $T2):\n    raise $$$A2\n"
        - pattern: "if not isinstance($V2, ($$$T2)):\n    raise $$$A2\n"
