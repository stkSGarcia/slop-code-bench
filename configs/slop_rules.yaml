  all:
  - has:
      stopBy: neighbor
      kind: block
      has:
        stopBy: neighbor
        kind: return_statement
        any:
        - regex: ^return\s+int\(
        - regex: ^return\s+float\(
        - regex: ^return\s+bool\(
        - regex: ^return\s+json\.loads?\(
        - regex: ^return\s+ast\.literal_eval\(
  - has:
      stopBy: neighbor
      kind: except_clause
      regex: '^except\s+(Exception|BaseException|ValueError|TypeError)(\s+as\s+\w+)?\s*:'
---
id: return-none-guard-ladder
