  regex: '^def [^\n]*:\n(?:    [^\n]*\n|        [^\n]*\n){0,80}    if [^\n]*:\n        return [^\n]*\n(?:    [^\n]*\n|        [^\n]*\n){0,80}    if [^\n]*:\n        return [^\n]*(?:\n(?:    [^\n]*|        [^\n]*))*\n?$'
---
id: flat-try-except-sentinel-helper
language: python
severity: warning
message: Flat helper wrapped in `try/except Exception` with a sentinel fallback is defensive slop
metadata:
  weight: 8
  category: slop
  min_file_count: 2
rule:
  kind: function_definition
  regex: '^def [^\n]*:\n(?:    [^\n]*\n|        [^\n]*\n){0,80}    try:\n(?:        [^\n]*\n)+    except Exception(?: as [^:]+)?:\n        return (None|False|\[\]|\{\})(?:\n(?:    [^\n]*|        [^\n]*))*\n?$'
---
id: flat-isinstance-return-helper
language: python
severity: warning
message: Flat helper that type-probes and quietly returns a sentinel is defensive normalization glue
metadata:
  weight: 8
  category: slop
  min_file_count: 2
rule:
  kind: function_definition
  regex: '^def [^\n]*:\n(?:    [^\n]*\n|        [^\n]*\n){0,80}    if not isinstance\([^\n]*\):\n        return (None|False|\[\]|\{\}|\(\)|0|""|'''')(?:\n(?:    [^\n]*|        [^\n]*))*\n?$'
---
id: flat-error-return-helper
language: python
severity: warning
message: Flat helper that returns named error sentinels from multiple guard clauses is defensive error plumbing
metadata:
  weight: 8
  category: slop
  min_file_count: 2
rule:
  kind: function_definition
  regex: '^def [^\n]*:\n(?:    [^\n]*\n|        [^\n]*\n){0,80}    if [^\n]*:\n        return [^\n]*(error|err|invalid|failed)[^\n]*\n(?:    [^\n]*\n|        [^\n]*\n){0,80}    if [^\n]*:\n        return [^\n]*(error|err|invalid|failed)[^\n]*(?:\n(?:    [^\n]*|        [^\n]*))*\n?$'
---
id: guard-railed-utility-module
language: python
severity: warning
message: 'Module is dominated by defensive `if ...: return ...` guard rails; this is branchy utility slop rather than focused code'
metadata:
  weight: 12
  category: slop
rule:
  kind: module
  regex: (?ms)(?:.*^    if [^\n]*:\n        return [^\n]*\n){20,}.*$
---
id: swallow-exception-pass-multi-stmt
language: python
severity: warning
message: '`except ...: pass` after multi-step work hides real failures; catch specific errors or log'
rule:
  any:
  - pattern: "try:\n  $FIRST\n  $SECOND\n  $$$REST\nexcept Exception:\n  pass\n"
  - pattern: "try:\n  $FIRST\n  $SECOND\n  $$$REST\nexcept:\n  pass\n"
---
id: defensive-fstring-raise-heavy
language: python
severity: warning
message: Function body has 3+ `raise ...(f'...{var}...')` statements; dense per-field validation belongs at the boundary, not in a helper.
metadata:
  weight: 4
  category: slop
rule:
  kind: function_definition
  regex: raise\s+\w+[^)]*f"[^"]*\{[^}]*\}[\s\S]*raise\s+\w+[^)]*f"[^"]*\{[^}]*\}[\s\S]*raise\s+\w+[^)]*f"[^"]*\{[^}]*\}
---
id: defensive-isinstance-raise-heavy
language: python
severity: warning
message: 'Function body runs 3+ `if not isinstance(...): raise` checks; these are boundary validations leaking into core logic.'
metadata:
  weight: 4
  category: slop
rule:
  kind: function_definition
  regex: if\s+not\s+isinstance\([^)]+\):[\s\S]*?raise[\s\S]*if\s+not\s+isinstance\([^)]+\):[\s\S]*?raise[\s\S]*if\s+not\s+isinstance\([^)]+\):[\s\S]*?raise
---
id: defensive-none-return-heavy
language: python
severity: warning
message: "Function body has 3+ `if \u2026 is None: return None` / `if not \u2026: return None` guards; plumbing `None` through helpers is defensive slop."
metadata:
  weight: 4
  category: slop
rule:
  kind: function_definition
  regex: (if\s+\w[\w.]*\s+is\s+None:\s*\n\s+return\s+None[\s\S]*){3,}
---
id: defensive-try-soup-function
language: python
severity: warning
message: "Function body has 3+ `try/except` blocks \u2014 that is error-handling-as-control-flow. Rethink the contract or split the function."
metadata:
  weight: 4
  category: slop
  min_file_count: 3
rule:
  kind: function_definition
  regex: (try:[\s\S]*?except[\s\S]*?){3,}
---
id: defensive-except-exception-heavy
language: python
severity: warning
message: Function body has 2+ `except Exception:` / bare `except:` clauses; catching-everything multiple times in one function is a paranoia smell.
metadata:
  weight: 4
  category: slop
  min_file_count: 3
rule:
  kind: function_definition
  regex: (except\s+Exception[\s:][\s\S]*){2,}
---
id: defensive-long-dispatch-ladder
language: python
severity: warning
message: "Function contains 4+ `if/elif <var> == \"STRING\":` branches \u2014 open-coded command/type routing; use a `{name: handler}` dispatch table."
metadata:
  weight: 5
  category: slop
  min_file_count: 2
rule:
  kind: function_definition
  regex: ((?:if|elif)\s+\w+\s*==\s*"[^"]+"\s*:[\s\S]*?){4,}
