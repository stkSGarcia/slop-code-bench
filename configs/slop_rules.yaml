  weight: 3
  category: slop
rule:
  kind: if_statement
  pattern: "if $X is None:\n    continue\n"
  inside:
    stopBy: end
    any:
    - kind: for_statement
    - kind: while_statement
---
id: parse-and-fallback-exception
language: python
severity: warning
message: '`try: return int/float/json.loads(x) except Exception: return <default>` parse-with-silent-fallback swallows format errors.'
